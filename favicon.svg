<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background tile -->
  <rect width="64" height="64" rx="14" fill="#0a0a0f"/>
  <!-- Rail tracks (two parallel lines at the bottom) -->
  <rect x="6" y="46" width="52" height="2" fill="#22c55e" opacity="0.55"/>
  <rect x="6" y="52" width="52" height="2" fill="#22c55e" opacity="0.55"/>
  <!-- Rail ties -->
  <rect x="10" y="42" width="4" height="14" rx="1" fill="#22c55e" opacity="0.35"/>
  <rect x="22" y="42" width="4" height="14" rx="1" fill="#22c55e" opacity="0.35"/>
  <rect x="34" y="42" width="4" height="14" rx="1" fill="#22c55e" opacity="0.35"/>
  <rect x="46" y="42" width="4" height="14" rx="1" fill="#22c55e" opacity="0.35"/>
  <!-- Train body -->
  <rect x="12" y="22" width="40" height="20" rx="4" fill="#22c55e"/>
  <!-- Train window (cab) -->
  <rect x="36" y="26" width="12" height="10" rx="2" fill="#0a0a0f"/>
  <!-- Front headlight -->
  <circle cx="18" cy="32" r="2.4" fill="#fbbf24"/>
  <!-- Chimney -->
  <rect x="18" y="14" width="7" height="9" rx="1.2" fill="#ea580c"/>
  <!-- Smoke puffs -->
  <circle cx="21" cy="10" r="3.2" fill="#94a3b8" opacity="0.55"/>
  <circle cx="16" cy="7" r="2" fill="#94a3b8" opacity="0.4"/>
  <!-- Wheels -->
  <circle cx="20" cy="44" r="4" fill="#0a0a0f" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="44" cy="44" r="4" fill="#0a0a0f" stroke="#22c55e" stroke-width="1.5"/>
</svg>
