<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.12"/>
    </pattern>
    <radialGradient id="fade" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="fadeMask">
      <rect width="1200" height="630" fill="url(#fade)"/>
    </mask>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" mask="url(#fadeMask)"/>

  <!-- Train icon on the left -->
  <g transform="translate(80, 225)">
    <!-- Chimney -->
    <rect x="40" y="-30" width="26" height="40" rx="4" fill="#ea580c"/>
    <!-- Smoke -->
    <circle cx="55" cy="-45" r="14" fill="#94a3b8" opacity="0.5"/>
    <circle cx="35" cy="-60" r="10" fill="#94a3b8" opacity="0.35"/>
    <!-- Body -->
    <rect x="0" y="0" width="180" height="110" rx="16" fill="#22c55e"/>
    <!-- Cab window -->
    <rect x="118" y="22" width="44" height="40" rx="6" fill="#0a0a0f"/>
    <!-- Headlight -->
    <circle cx="30" cy="45" r="10" fill="#fbbf24"/>
    <!-- Wheels -->
    <circle cx="40" cy="125" r="18" fill="#0a0a0f" stroke="#22c55e" stroke-width="5"/>
    <circle cx="140" cy="125" r="18" fill="#0a0a0f" stroke="#22c55e" stroke-width="5"/>
  </g>

  <!-- Title -->
  <text x="340" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="82" font-weight="700" fill="#ffffff">Play Railmount</text>
  <text x="340" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="700" fill="#22c55e">Online &mdash; Free</text>
  <text x="340" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#9ca3af">A train puzzle game by Hempuli</text>

  <!-- Rail line (animated-dash style, static here) -->
  <g transform="translate(0, 510)">
    <rect x="80" y="10" width="1040" height="3" fill="#22c55e" opacity="0.5"/>
    <rect x="80" y="22" width="1040" height="3" fill="#22c55e" opacity="0.5"/>
    <!-- Ties -->
    <g fill="#22c55e" opacity="0.35">
      <rect x="100" y="4" width="8" height="28" rx="1"/>
      <rect x="170" y="4" width="8" height="28" rx="1"/>
      <rect x="240" y="4" width="8" height="28" rx="1"/>
      <rect x="310" y="4" width="8" height="28" rx="1"/>
      <rect x="380" y="4" width="8" height="28" rx="1"/>
      <rect x="450" y="4" width="8" height="28" rx="1"/>
      <rect x="520" y="4" width="8" height="28" rx="1"/>
      <rect x="590" y="4" width="8" height="28" rx="1"/>
      <rect x="660" y="4" width="8" height="28" rx="1"/>
      <rect x="730" y="4" width="8" height="28" rx="1"/>
      <rect x="800" y="4" width="8" height="28" rx="1"/>
      <rect x="870" y="4" width="8" height="28" rx="1"/>
      <rect x="940" y="4" width="8" height="28" rx="1"/>
      <rect x="1010" y="4" width="8" height="28" rx="1"/>
      <rect x="1080" y="4" width="8" height="28" rx="1"/>
    </g>
  </g>

  <!-- Domain -->
  <text x="600" y="590" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#6b7280">railmountgame.com</text>
</svg>
